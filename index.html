<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paid Social — Gift Card Incentives</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
@font-face { font-family:'Fields'; font-weight:400; font-display:swap;
  src:url('fonts/Fields-Regular.woff2') format('woff2'); }
@font-face { font-family:'Fields'; font-weight:600; font-display:swap;
  src:url('fonts/Fields-SemiBold.woff2') format('woff2'); }
@font-face { font-family:'Fields'; font-weight:700; font-display:swap;
  src:url('fonts/Fields-Bold.woff2') format('woff2'); }

:root {
  --brand:#2E7918; --brand-d:#215C10; --brand-bg:#EBF5E8;
  --font-heading:'Fields',Georgia,serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --text-strong:#38312f; --text-medium:#48413f; --text-weak:#676260;
  --text-x-weak:#777270; --text-xx-weak:#868180;
  --surface-page:#f6f6f4; --surface-card:#fff; --surface-raised:#f5f4f1;
  --surface-hover:#f5f4f1;
  --border-weak:#e4e3e0; --border-default:#d4d2d0;
  --positive:#028a01; --negative:#de1429;
  --sp-4:4px; --sp-8:8px; --sp-12:12px; --sp-16:16px;
  --sp-20:20px; --sp-24:24px; --sp-32:32px;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-full:1000px;
  --shadow-card:1px 1px 0 1px rgba(0,0,0,.04);
  --shadow-raised:1px 1px 0 2px rgba(0,0,0,.03);
  --shadow-float:0 12px 28px rgba(0,0,0,.12),0 0 0 1px var(--border-weak);
  /* Tier colors — match Tableau exactly */
  --c-other:#df5857; --c-50:#4e79a8; --c-75:#78b7b2;
  --c-100:#f18f1c; --c-150:#59a14f;
}
[data-theme="dark"] {
  --brand:#5ec25a; --brand-d:#7dd67a; --brand-bg:#172c14;
  --text-strong:#f5f4f1; --text-medium:#e4e3e0; --text-weak:#c6c2bf;
  --text-x-weak:#868180; --text-xx-weak:#6b6663;
  --surface-page:#151211; --surface-card:#1e1b1a; --surface-raised:#252220;
  --surface-hover:#2d2a28;
  --border-weak:#2d2a28; --border-default:#3d3937;
  --positive:#5ec25a; --negative:#f47077;
  --shadow-card:1px 1px 0 1px rgba(0,0,0,.4);
  --shadow-raised:1px 1px 0 2px rgba(0,0,0,.35);
  --shadow-float:0 12px 28px rgba(0,0,0,.5),0 0 0 1px var(--border-default);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font-body); font-size:14px; color:var(--text-strong);
  background:var(--surface-page); padding-bottom:32px; line-height:1.5;
  transition:background .2s,color .2s; }

/* ── HEADER ── */
.header { background:var(--surface-card); border-bottom:1px solid var(--border-weak);
  padding:10px var(--sp-20); display:flex; align-items:center; gap:10px;
  flex-wrap:wrap; position:sticky; top:0; z-index:300; box-shadow:var(--shadow-card); }
.logo { font-family:var(--font-heading); font-size:18px; font-weight:700;
  color:var(--text-strong); flex-shrink:0; letter-spacing:-.01em; }
.sep { width:1px; height:22px; background:var(--border-weak); flex-shrink:0; }
.fg { display:flex; align-items:center; gap:var(--sp-4); }
.fl { font-size:11px; font-weight:600; color:var(--text-x-weak);
  text-transform:uppercase; letter-spacing:.06em; white-space:nowrap; }
input[type=date], select { font-family:var(--font-body); font-size:13px;
  padding:4px var(--sp-8); border:1px solid var(--border-default);
  border-radius:var(--r-xs); background:var(--surface-card); color:var(--text-strong);
  outline:none; cursor:pointer; transition:border-color .15s; }
input[type=date]:focus, select:focus { border-color:var(--brand);
  box-shadow:0 0 0 3px var(--brand-bg); }
[data-theme="dark"] input[type=date],[data-theme="dark"] select { color-scheme:dark; }
.btn { font-family:var(--font-body); padding:5px var(--sp-16); font-size:13px;
  font-weight:600; border:none; border-radius:var(--r-full); cursor:pointer;
  transition:background .15s; }
.btn-green { background:var(--brand); color:#fff; }
.btn-green:hover { background:var(--brand-d); }
.btn-ghost { background:transparent; color:var(--text-x-weak);
  border:1px solid var(--border-default); }
.btn-ghost:hover { border-color:var(--brand); color:var(--brand); }
.upd { font-size:11px; color:var(--text-xx-weak); margin-left:auto; white-space:nowrap; }
.theme-toggle { width:34px; height:34px; border-radius:var(--r-full);
  border:1px solid var(--border-default); background:var(--surface-raised);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:16px; flex-shrink:0; }
.theme-toggle:hover { border-color:var(--brand); background:var(--brand-bg); }

/* ── SOLO TIER BANNER ── */
.solo-banner {
  display:none; align-items:center; gap:8px; flex-wrap:wrap;
  padding:6px var(--sp-20); background:var(--surface-brand);
  border-bottom:1px solid var(--brand); font-size:12px; color:var(--brand); font-weight:600;
}
.solo-banner.visible { display:flex; }
.solo-clear { margin-left:auto; font-size:11px; font-weight:600; color:var(--brand);
  cursor:pointer; text-decoration:underline; background:none; border:none; padding:0; }
.solo-clear:hover { color:var(--brand-d); }
.legend-hint { text-align:center; font-size:11px; color:var(--text-xx-weak); margin-top:4px; }

/* ── CONTENT ── */
.content { max-width:1600px; margin:0 auto; padding:var(--sp-24) var(--sp-20); }
.section-title { font-family:var(--font-heading); font-size:15px; font-weight:700;
  color:var(--text-strong); margin-bottom:var(--sp-12); letter-spacing:-.01em; }

/* ── KPI TIER GRID ── */
.tier-grid { display:grid; grid-template-columns:repeat(5,1fr);
  gap:var(--sp-16); margin-bottom:var(--sp-32); }
@media(max-width:1100px){ .tier-grid { grid-template-columns:repeat(3,1fr); } }
@media(max-width:700px) { .tier-grid { grid-template-columns:repeat(2,1fr); } }
.tier-card { background:var(--surface-card); border-radius:var(--r-md);
  border:1px solid var(--border-weak); box-shadow:var(--shadow-card); overflow:hidden; }
.tier-card-header { padding:var(--sp-12) var(--sp-16) var(--sp-8);
  font-weight:700; font-size:15px; border-bottom:3px solid; }
.tier-card-body { padding:var(--sp-12) var(--sp-16); }

/* Rate rows — Tableau puts these first and large */
.kpi-rate-row { display:flex; justify-content:space-between; align-items:baseline;
  padding:6px 0; border-bottom:1px solid var(--border-weak); }
.kpi-rate-label { font-size:12px; color:var(--text-weak); font-weight:600; }
.kpi-rate-val { font-size:18px; font-weight:700; font-variant-numeric:tabular-nums; }

/* Count rows below rates */
.kpi-count-row { display:flex; justify-content:space-between; align-items:baseline;
  padding:4px 0; border-bottom:1px solid var(--border-weak); }
.kpi-count-row:last-child { border-bottom:none; }
.kpi-count-label { font-size:12px; color:var(--text-weak); font-weight:500; }
.kpi-count-val { font-size:14px; font-weight:700; color:var(--text-strong);
  font-variant-numeric:tabular-nums; }

/* Header accent */
.tier-other .tier-card-header { color:var(--c-other); border-color:var(--c-other); }
.tier-50    .tier-card-header { color:var(--c-50);    border-color:var(--c-50); }
.tier-75    .tier-card-header { color:var(--c-75);    border-color:var(--c-75); }
.tier-100   .tier-card-header { color:var(--c-100);   border-color:var(--c-100); }
.tier-150   .tier-card-header { color:var(--c-150);   border-color:var(--c-150); }

/* Rate val accent matches tier */
.tier-other .kpi-rate-val { color:var(--c-other); }
.tier-50    .kpi-rate-val { color:var(--c-50); }
.tier-75    .kpi-rate-val { color:var(--c-75); }
.tier-100   .kpi-rate-val { color:var(--c-100); }
.tier-150   .kpi-rate-val { color:var(--c-150); }

/* ── CHARTS ── */
.chart-card { background:var(--surface-card); border-radius:var(--r-md);
  border:1px solid var(--border-weak); box-shadow:var(--shadow-card);
  padding:var(--sp-20); margin-bottom:var(--sp-16); }
.chart-card-header { display:flex; align-items:center; justify-content:space-between;
  margin-bottom:var(--sp-16); }
.chart-card-title { font-family:var(--font-heading); font-size:14px; font-weight:700;
  color:var(--text-strong); }
.chart-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-16);
  margin-bottom:var(--sp-16); }
@media(max-width:900px) { .chart-row-2 { grid-template-columns:1fr; } }

/* ── TABLE ── */
.table-card { background:var(--surface-card); border-radius:var(--r-md);
  border:1px solid var(--border-weak); box-shadow:var(--shadow-card); overflow:hidden; }
.table-card-header { padding:var(--sp-16) var(--sp-20); border-bottom:1px solid var(--border-weak);
  display:flex; align-items:center; justify-content:space-between; gap:var(--sp-12); flex-wrap:wrap; }
.table-search { font-family:var(--font-body); font-size:13px; padding:5px 10px;
  border:1px solid var(--border-default); border-radius:var(--r-full);
  background:var(--surface-raised); color:var(--text-strong); outline:none; width:240px; }
.table-search:focus { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-bg); }
.table-search::placeholder { color:var(--text-xx-weak); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { padding:10px 14px; text-align:left; font-weight:600; color:var(--text-weak);
  font-size:11px; text-transform:uppercase; letter-spacing:.05em;
  background:var(--surface-raised); border-bottom:1px solid var(--border-weak);
  white-space:nowrap; cursor:pointer; user-select:none; }
thead th:hover { color:var(--text-strong); }
thead th .sort-icon { opacity:.4; margin-left:3px; }
thead th.sort-asc  .sort-icon::after { content:'▲'; }
thead th.sort-desc .sort-icon::after { content:'▼'; }
thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content:'⬍'; }
tbody tr { border-bottom:1px solid var(--border-weak); transition:background .1s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--surface-hover); }
tbody td { padding:9px 14px; color:var(--text-medium); }
td.num  { text-align:right; font-variant-numeric:tabular-nums; }
td.rate { text-align:right; color:var(--text-x-weak); font-size:12px;
  font-variant-numeric:tabular-nums; }
.tier-dot { display:inline-block; width:10px; height:10px; border-radius:50%;
  margin-right:6px; vertical-align:middle; }
.dot-other { background:var(--c-other); } .dot-50 { background:var(--c-50); }
.dot-75    { background:var(--c-75); }   .dot-100 { background:var(--c-100); }
.dot-150   { background:var(--c-150); }
.row-count { font-size:12px; color:var(--text-x-weak); }

/* ── LOADING ── */
.loading { text-align:center; padding:48px 20px; color:var(--text-x-weak); }
.loading-spinner { width:28px; height:28px; border:3px solid var(--border-weak);
  border-top-color:var(--brand); border-radius:50%; animation:spin .7s linear infinite;
  margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── VIZ-IN-TOOLTIP ── */
#vizTooltip {
  display:none; position:fixed; z-index:9999; pointer-events:none;
  background:var(--surface-card); border:1px solid var(--border-weak);
  border-radius:var(--r-md); box-shadow:var(--shadow-float);
  padding:12px 16px; min-width:320px; max-width:460px; font-size:12px;
}
.vtt-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.vtt-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.vtt-tier { font-weight:700; font-size:13px; color:var(--text-strong); }
.vtt-month { color:var(--text-x-weak); font-size:12px; }
.vtt-metric { font-size:12px; color:var(--text-medium); margin-bottom:10px; }
.vtt-metric strong { color:var(--text-strong); }
.vtt-divider { font-size:10px; font-weight:700; color:var(--text-xx-weak);
  text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px;
  padding-bottom:5px; border-bottom:1px solid var(--border-weak); }
.vtt-bar-row { display:grid; grid-template-columns:1fr auto;
  gap:4px; align-items:center; margin-bottom:5px; }
.vtt-bar-label { font-size:11px; color:var(--text-medium); overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap; max-width:300px; }
.vtt-bar-val { font-size:11px; font-weight:700; color:var(--text-strong);
  text-align:right; min-width:28px; font-variant-numeric:tabular-nums; }
.vtt-bar-track { grid-column:1/-1; height:5px; background:var(--border-weak);
  border-radius:3px; overflow:hidden; margin-top:-2px; margin-bottom:2px; }
.vtt-bar-fill { height:100%; border-radius:3px; transition:width .2s; }
.vtt-no-data { color:var(--text-xx-weak); font-style:italic; font-size:11px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <span class="logo">Paid Social Gift Card Incentives</span>
  <div class="sep"></div>
  <div class="fg">
    <span class="fl">Start</span>
    <input type="date" id="startDate" value="2025-01-01">
  </div>
  <div class="fg">
    <span class="fl">End</span>
    <input type="date" id="endDate">
  </div>
  <button class="btn btn-green" onclick="applyFilters()">Apply</button>
  <button class="btn btn-ghost" onclick="resetFilters()">Reset</button>
  <span class="upd" id="updatedAt"></span>
  <button class="theme-toggle" id="themeBtn" title="Toggle dark mode">🌙</button>
</header>

<!-- SOLO TIER BANNER — shown when a legend tier is isolated -->
<div class="solo-banner" id="soloBanner">
  <span id="soloLabel"></span>
  <button class="solo-clear" onclick="clearSolo()">Show all tiers</button>
</div>

<!-- VIZ-IN-TOOLTIP (positioned by JS) -->
<div id="vizTooltip"></div>

<!-- CONTENT -->
<div class="content">

  <!-- KPI CARDS -->
  <div class="section-title">Totals by Tier — Selected Period</div>
  <div class="tier-grid" id="tierGrid">
    <div class="loading" style="grid-column:1/-1"><div class="loading-spinner"></div>Loading…</div>
  </div>

  <!-- LINE CHART + STACKED BAR METRIC SELECTOR -->
  <div class="chart-card">
    <div class="chart-card-header">
      <span class="chart-card-title" id="lineTitle">SAO Over Time by Tier</span>
      <div class="fg">
        <span class="fl">Metric</span>
        <!-- Matches Tableau Parameter 5 exactly -->
        <select id="metricSel">
          <option value="mql1">MQL1</option>
          <option value="mql2">MQL2</option>
          <option value="sal">SAL</option>
          <option value="tql">TQL</option>
          <option value="sao" selected>SAO</option>
          <option value="sao_ta">SAO TA</option>
          <option value="cw">CW</option>
          <option value="cw_ta">CW TA</option>
          <option value="cw_mrr">CW MRR ($)</option>
          <option value="cw_mrr_ta">CW MRR TA ($)</option>
          <option value="cl">CL</option>
        </select>
      </div>
    </div>
    <div style="position:relative;height:340px">
      <canvas id="lineChart"></canvas>
    </div>
  </div>

  <!-- STACKED BAR -->
  <div class="chart-card">
    <div class="chart-card-header">
      <span class="chart-card-title" id="stackedTitle">Monthly SAO — Stacked by Tier</span>
    </div>
    <div style="position:relative;height:300px">
      <canvas id="stackedBar"></canvas>
    </div>
    <p class="legend-hint">Click a tier in the legend to isolate · click again to show all</p>
  </div>

  <!-- AD GROUP TABLE -->
  <div class="table-card">
    <div class="table-card-header">
      <span class="section-title" style="margin:0">Ad Group Performance</span>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="text" class="table-search" id="tableSearch"
          placeholder="Search ad groups…" oninput="renderTable()">
        <span class="row-count" id="rowCount"></span>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table id="agTable">
        <thead>
          <tr>
            <th onclick="sortTable('gc_tier')"       data-col="gc_tier">Tier <span class="sort-icon"></span></th>
            <th onclick="sortTable('ad_group_name')" data-col="ad_group_name">Ad Group <span class="sort-icon"></span></th>
            <th onclick="sortTable('ad_campaign_name')" data-col="ad_campaign_name">Campaign <span class="sort-icon"></span></th>
            <th onclick="sortTable('mql1')"   data-col="mql1"   class="num sort-desc">MQL1 <span class="sort-icon"></span></th>
            <th onclick="sortTable('sao')"    data-col="sao"    class="num">SAO <span class="sort-icon"></span></th>
            <th onclick="sortTable('cw')"     data-col="cw"     class="num">CW <span class="sort-icon"></span></th>
            <th onclick="sortTable('dq')"     data-col="dq"     class="num">DQ <span class="sort-icon"></span></th>
            <th onclick="sortTable('cw_mrr')" data-col="cw_mrr" class="num">CW MRR <span class="sort-icon"></span></th>
            <th class="num" style="cursor:default">MQL1→SAO</th>
          </tr>
        </thead>
        <tbody id="agBody">
          <tr><td colspan="9"><div class="loading"><div class="loading-spinner"></div>Loading…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
/* ── STATE ── */
let ALL_DATA  = null;
let sortCol   = 'mql1';
let sortDir   = 'desc';
let soloTier  = null;   // null = all tiers; string = isolated tier
let lineChart, stackedBarChart;
let AG_LOOKUP  = {};
let lineMonths = [];
let barMonths  = [];

/* Tableau sort order */
const TIER_ORDER = ['$50','$75','$100','$150','Other'];
const TIER_COLORS = { '$50':'#4e79a8', '$75':'#78b7b2', '$100':'#f18f1c', '$150':'#59a14f', 'Other':'#df5857' };
const TIER_DOT    = { '$50':'dot-50', '$75':'dot-75', '$100':'dot-100', '$150':'dot-150', 'Other':'dot-other' };
const TIER_CLASS  = { '$50':'tier-50', '$75':'tier-75', '$100':'tier-100', '$150':'tier-150', 'Other':'tier-other' };

const METRIC_LABELS = {
  mql1:'MQL1', mql2:'MQL2', sal:'SAL', tql:'TQL',
  sao:'SAO', sao_ta:'SAO TA', cw:'CW', cw_ta:'CW TA',
  cw_mrr:'CW MRR', cw_mrr_ta:'CW MRR TA', cl:'CL'
};
const MONEY_METRICS = new Set(['cw_mrr','cw_mrr_ta']);

/* ── AD GROUP LOOKUP ── */
function buildAdGroupLookup() {
  AG_LOOKUP = {};
  if (!ALL_DATA || !ALL_DATA.monthly_adgroups) return;
  ALL_DATA.monthly_adgroups.forEach(r => {
    const key = r.gc_tier + '|' + r.month.slice(0,7);
    if (!AG_LOOKUP[key]) AG_LOOKUP[key] = [];
    AG_LOOKUP[key].push(r);
  });
}

/* ── VIZ-IN-TOOLTIP ── */
function externalVizTooltip(context, monthsArr) {
  const { chart, tooltip } = context;
  const el = document.getElementById('vizTooltip');

  if (tooltip.opacity === 0 || !tooltip.dataPoints?.length) {
    el.style.display = 'none';
    return;
  }

  const dp      = tooltip.dataPoints[0];
  const tier    = dp.dataset.label;
  const idx     = dp.dataIndex;
  const metric  = document.getElementById('metricSel').value;
  const isMoney = MONEY_METRICS.has(metric);
  const val     = isMoney ? fmtMoney(dp.raw) : fmt(dp.raw);
  const monthLbl = dp.label;
  const color    = TIER_COLORS[tier] || '#888';

  // Use the same date range the report is filtered to
  const { start: rangeStart, end: rangeEnd } = getDateRange();

  // Aggregate monthly_adgroups for this tier across the full filtered date range
  const aggr = {};
  (ALL_DATA.monthly_adgroups || [])
    .filter(r => {
      const m = r.month.slice(0,7);
      return r.gc_tier === tier && m >= rangeStart && m <= rangeEnd;
    })
    .forEach(r => {
      const k = r.ad_group_name;
      if (!aggr[k]) aggr[k] = { ad_group_name: k, mql1:0, mql2:0, sal:0, tql:0, sao:0, sao_ta:0, cw:0, cw_ta:0, cw_mrr:0, cw_mrr_ta:0, cl:0, dq:0, mql1_ta:0 };
      Object.keys(aggr[k]).forEach(f => {
        if (f !== 'ad_group_name') aggr[k][f] += +r[f] || 0;
      });
    });

  const rows = Object.values(aggr)
    .filter(r => (+r[metric] || 0) > 0)
    .sort((a, b) => (+b[metric] || 0) - (+a[metric] || 0))
    .slice(0, 8);

  const maxVal = rows.length ? (+rows[0][metric] || 0) : 1;

  let barsHtml = rows.length
    ? rows.map(r => {
        const v   = +r[metric] || 0;
        const pct = maxVal > 0 ? (v / maxVal * 100).toFixed(1) : 0;
        const lbl = r.ad_group_name.length > 52 ? r.ad_group_name.slice(0,52) + '…' : r.ad_group_name;
        const disp = isMoney ? fmtMoney(v) : fmt(v);
        return `<div class="vtt-bar-row">
          <span class="vtt-bar-label" title="${r.ad_group_name}">${lbl}</span>
          <span class="vtt-bar-val">${disp}</span>
          <div class="vtt-bar-track"><div class="vtt-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
      }).join('')
    : `<div class="vtt-no-data">No ad group data for this period</div>`;

  el.innerHTML = `
    <div class="vtt-header">
      <div class="vtt-dot" style="background:${color}"></div>
      <span class="vtt-tier">${tier}</span>
      <span class="vtt-month">${monthLbl}</span>
    </div>
    <div class="vtt-metric">${METRIC_LABELS[metric]}: <strong>${val}</strong></div>
    <div class="vtt-divider">Top Ad Groups — ${METRIC_LABELS[metric]} (filtered period)</div>
    ${barsHtml}`;

  // Position adjacent to cursor; el is position:fixed so coords are viewport-relative
  const canvas = chart.canvas;
  const rect   = canvas.getBoundingClientRect();
  const cx = rect.left + tooltip.caretX;
  const cy = rect.top  + tooltip.caretY;

  el.style.display = 'block';
  const tw = el.offsetWidth  || 300;
  const th = el.offsetHeight || 200;

  // Prefer right of cursor; flip left if would clip viewport
  let x = cx + 10;
  if (x + tw > window.innerWidth - 8) x = cx - tw - 10;
  // Prefer aligning top to cursor; flip up if would clip viewport
  let y = cy - 12;
  if (y + th > window.innerHeight - 8) y = cy - th + 12;
  if (y < 8) y = 8;

  el.style.left = x + 'px';
  el.style.top  = y + 'px';
}

/* ── LOAD ── */
async function loadData() {
  try {
    const r = await fetch('data/gc_data.json?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    ALL_DATA = await r.json();
    document.getElementById('updatedAt').textContent =
      'Updated ' + new Date(ALL_DATA.generated_at).toLocaleString(undefined,
        {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e) {
    document.getElementById('tierGrid').innerHTML =
      `<div class="loading" style="grid-column:1/-1">⚠ Could not load data: ${e.message}</div>`;
  }
}

/* ── HELPERS ── */
function getDateRange() {
  const s = document.getElementById('startDate').value || '2020-01-01';
  const e = document.getElementById('endDate').value || new Date().toISOString().slice(0,10);
  // Return YYYY-MM strings for timezone-safe string comparison
  return { start: s.slice(0,7), end: e.slice(0,7) };
}

function inRange(monthStr, start, end) {
  // ISO string comparison works correctly: "2026-01" >= "2025-01"
  const m = monthStr.slice(0,7);
  return m >= start && m <= end;
}

function tierVisible(tier) {
  return soloTier === null || soloTier === tier;
}

function filteredMonthly() {
  if (!ALL_DATA) return [];
  const { start, end } = getDateRange();
  return ALL_DATA.monthly.filter(r =>
    tierVisible(r.gc_tier) && inRange(r.month, start, end)
  );
}

function tierTotals() {
  const t = {};
  TIER_ORDER.forEach(k => t[k] = {mql1:0,mql2:0,sal:0,tql:0,sao:0,sao_ta:0,cw:0,cw_ta:0,cw_mrr:0,cw_mrr_ta:0,cl:0});
  filteredMonthly().forEach(r => {
    if (!t[r.gc_tier]) return;
    ['mql1','mql2','sal','tql','sao','sao_ta','cw','cw_ta','cw_mrr','cw_mrr_ta','cl','dq'].forEach(k => {
      t[r.gc_tier][k] = (t[r.gc_tier][k] || 0) + (+r[k] || 0);
    });
  });
  return t;
}

function fmt(n)      { return (+n||0).toLocaleString(); }
function fmtPct(n,d) { return isNaN(n)||!isFinite(n) ? '—' : (+n*100).toFixed(d||0)+'%'; }
function fmtMoney(n) { const v=+n||0; if(!v) return '—'; return v>=1000?'$'+(v/1000).toFixed(1)+'k':'$'+v.toFixed(0); }
function truncate(s,max) { return s&&s.length>max ? s.slice(0,max)+'…' : (s||''); }

/* ── RENDER ALL ── */
function render() {
  if (!ALL_DATA) return;
  buildAdGroupLookup();
  renderKPICards();
  renderLineChart();
  renderStackedBar();
  renderTable();
}

/* ── KPI CARDS ── */
/* Tableau layout per tier: MQL1>SAO rate, SAO>CW rate, then MQL1, SAO, CW, CW MRR */
function renderKPICards() {
  const totals = tierTotals();
  const grid   = document.getElementById('tierGrid');
  let html = '';

  TIER_ORDER.forEach(tier => {
    if (!tierVisible(tier)) return;
    const d = totals[tier];
    const mqlSaoRate = d.mql1 > 0 ? d.sao / d.mql1 : null;
    const saoCwRate  = d.sao  > 0 ? d.cw  / d.sao  : null;

    html += `
      <div class="tier-card ${TIER_CLASS[tier]}">
        <div class="tier-card-header">${tier}</div>
        <div class="tier-card-body">
          <div class="kpi-rate-row">
            <span class="kpi-rate-label">MQL1 &gt; SAO</span>
            <span class="kpi-rate-val">${mqlSaoRate !== null ? fmtPct(mqlSaoRate,0) : '—'}</span>
          </div>
          <div class="kpi-rate-row">
            <span class="kpi-rate-label">SAO &gt; CW</span>
            <span class="kpi-rate-val">${saoCwRate !== null ? fmtPct(saoCwRate,1) : '—'}</span>
          </div>
          <div class="kpi-count-row">
            <span class="kpi-count-label">MQL1</span>
            <span class="kpi-count-val">${fmt(d.mql1)}</span>
          </div>
          <div class="kpi-count-row">
            <span class="kpi-count-label">SAO</span>
            <span class="kpi-count-val">${fmt(d.sao)}</span>
          </div>
          <div class="kpi-count-row">
            <span class="kpi-count-label">CW</span>
            <span class="kpi-count-val">${fmt(d.cw)}</span>
          </div>
          <div class="kpi-count-row">
            <span class="kpi-count-label">CW MRR</span>
            <span class="kpi-count-val">${fmtMoney(d.cw_mrr)}</span>
          </div>
        </div>
      </div>`;
  });

  grid.innerHTML = html || '<div style="grid-column:1/-1;color:var(--text-x-weak);padding:24px">No tiers selected.</div>';
}

/* ── LINE CHART ── */
function renderLineChart() {
  const metric = document.getElementById('metricSel').value;
  const label  = METRIC_LABELS[metric];
  const isMoney = MONEY_METRICS.has(metric);
  document.getElementById('lineTitle').textContent = `${label} Over Time by Tier`;

  const monthly = filteredMonthly();
  const months  = [...new Set(monthly.map(r => r.month.slice(0,7)))].sort();

  const byTier = {};
  TIER_ORDER.forEach(t => { byTier[t] = {}; });
  monthly.forEach(r => {
    const m = r.month.slice(0,7);
    if (byTier[r.gc_tier] !== undefined)
      byTier[r.gc_tier][m] = (byTier[r.gc_tier][m]||0) + (+r[metric]||0);
  });

  const datasets = TIER_ORDER.map(t => ({
    label: t,
    data:  months.map(m => byTier[t][m]||0),
    borderColor:     TIER_COLORS[t],
    backgroundColor: TIER_COLORS[t]+'22',
    borderWidth: 2.5,
    pointRadius: 4,
    pointHoverRadius: 7,
    tension: 0.3,
    fill: false,
    hidden: soloTier !== null && t !== soloTier,
    datalabels: {
      color: TIER_COLORS[t],
      font: { size:10, weight:'700' },
      anchor: 'end',
      align: 'top',
      offset: 2,
      display: 'auto',
      formatter: v => v === 0 ? null : (isMoney ? fmtMoney(v) : fmt(v)),
    }
  }));

  const xlabels = months.map(m => {
    const [y, mo] = m.split('-');
    const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return MON[+mo-1] + " '" + y.slice(2);
  });

  lineMonths = months; // store for tooltip lookup

  if (lineChart) {
    lineChart.data.labels   = xlabels;
    lineChart.data.datasets = datasets;
    lineChart.options.scales.y.title.text = label;
    lineChart.update();
    return;
  }

  lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    plugins: [ChartDataLabels],
    data: { labels: xlabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 24 } },
      interaction: { mode:'nearest', intersect:true },
      plugins: {
        legend: { position:'bottom', labels:{ boxWidth:12, padding:16, font:{size:12} },
          onClick: legendClick },
        tooltip: {
          enabled: false,
          external: ctx => externalVizTooltip(ctx, lineMonths),
        },
        datalabels: {}
      },
      scales: {
        x: { grid:{ color:'rgba(0,0,0,.04)' }, ticks:{ font:{size:11}, maxRotation:45 } },
        y: {
          grid:{ color:'rgba(0,0,0,.04)' },
          ticks:{ font:{size:11}, callback: v => isMoney ? fmtMoney(v) : fmt(v) },
          title:{ display:true, text:label, font:{size:11} }
        }
      }
    }
  });
}

/* ── STACKED BAR ── */
function renderStackedBar() {
  const metric = document.getElementById('metricSel').value;
  const label  = METRIC_LABELS[metric];
  const isMoney = MONEY_METRICS.has(metric);
  document.getElementById('stackedTitle').textContent = `Monthly ${label} — Stacked by Tier`;

  const monthly = filteredMonthly();
  const months  = [...new Set(monthly.map(r => r.month.slice(0,7)))].sort();
  const byTier  = {};
  TIER_ORDER.forEach(t => { byTier[t] = {}; });
  monthly.forEach(r => {
    const m = r.month.slice(0,7);
    if (byTier[r.gc_tier] !== undefined)
      byTier[r.gc_tier][m] = (byTier[r.gc_tier][m]||0) + (+r[metric]||0);
  });

  const datasets = TIER_ORDER.map(t => ({
    label: t,
    data:  months.map(m => byTier[t][m]||0),
    backgroundColor: TIER_COLORS[t]+'cc',
    borderColor:     TIER_COLORS[t],
    borderWidth: 1,
    hidden: soloTier !== null && t !== soloTier,
  }));

  const xlabels = months.map(m => {
    const [y, mo] = m.split('-');
    const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return MON[+mo-1] + " '" + y.slice(2);
  });

  barMonths = months; // store for tooltip lookup

  // Custom plugin: draw total above each stacked bar column
  const stackedTotalPlugin = {
    id: 'stackedTotal',
    afterDatasetsDraw(chart) {
      const { ctx, scales: { x, y } } = chart;
      const totals = new Array(months.length).fill(0);
      chart.data.datasets.forEach((ds, di) => {
        if (chart.getDatasetMeta(di).hidden) return;
        ds.data.forEach((v, i) => { totals[i] += +v || 0; });
      });
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      ctx.save();
      ctx.font = 'bold 10px Inter, -apple-system, sans-serif';
      ctx.fillStyle = dark ? '#c6c2bf' : '#38312f';
      ctx.textAlign = 'center';
      totals.forEach((total, i) => {
        if (!total) return;
        const xp = x.getPixelForValue(i);
        const yp = y.getPixelForValue(total);
        const disp = isMoney ? fmtMoney(total) : fmt(total);
        ctx.fillText(disp, xp, yp - 5);
      });
      ctx.restore();
    }
  };

  if (stackedBarChart) {
    stackedBarChart.data.labels   = xlabels;
    stackedBarChart.data.datasets = datasets;
    stackedBarChart.options.scales.y.title.text = label;
    stackedBarChart.update();
    return;
  }

  stackedBarChart = new Chart(document.getElementById('stackedBar'), {
    type: 'bar',
    plugins: [ChartDataLabels, stackedTotalPlugin],
    data: { labels: xlabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 20 } }, // room for total labels above bars
      plugins: {
        legend: { position:'bottom', labels:{ boxWidth:12, padding:12, font:{size:11} },
          onClick: legendClick },
        tooltip: {
          enabled: false,
          external: ctx => externalVizTooltip(ctx, barMonths),
        },
        datalabels: {
          display: 'auto',
          color: '#fff',
          font: { size: 9, weight: '700' },
          formatter: (v) => (!v || v === 0) ? null : (isMoney ? fmtMoney(v) : fmt(v)),
          clamp: true,
          clip: true,
          anchor: 'center',
          align: 'center',
        }
      },
      scales: {
        x: { stacked:true, grid:{ display:false }, ticks:{ font:{size:10}, maxRotation:45 } },
        y: {
          stacked:true, grid:{ color:'rgba(0,0,0,.04)' },
          ticks:{ font:{size:11}, callback: v => isMoney ? fmtMoney(v) : fmt(v) },
          title:{ display:true, text:label, font:{size:11} }
        }
      }
    }
  });
}

/* ── TABLE ── */
function renderTable() {
  if (!ALL_DATA) return;
  const query = (document.getElementById('tableSearch').value||'').toLowerCase();
  let rows = ALL_DATA.ad_groups
    .filter(r => tierVisible(r.gc_tier))
    .filter(r => !query ||
      r.ad_group_name.toLowerCase().includes(query) ||
      r.ad_campaign_name.toLowerCase().includes(query));

  rows = [...rows].sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') {
      av = av.toLowerCase(); bv = bv.toLowerCase();
      return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    av = +av||0; bv = +bv||0;
    return sortDir==='asc' ? av-bv : bv-av;
  });

  document.getElementById('rowCount').textContent = `${rows.length} ad groups`;

  const tbody = document.getElementById('agBody');
  if (!rows.length) {
    tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text-x-weak)">No results</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const rate = +r.mql1>0 ? (+r.sao / +r.mql1*100).toFixed(1)+'%' : '—';
    return `<tr>
      <td><span class="tier-dot ${TIER_DOT[r.gc_tier]}"></span>${r.gc_tier}</td>
      <td title="${r.ad_group_name}">${truncate(r.ad_group_name,50)}</td>
      <td title="${r.ad_campaign_name}">${truncate(r.ad_campaign_name,45)}</td>
      <td class="num">${fmt(r.mql1)}</td>
      <td class="num">${fmt(r.sao)}</td>
      <td class="num">${fmt(r.cw)}</td>
      <td class="num">${fmt(r.dq)}</td>
      <td class="num">${fmtMoney(r.cw_mrr)}</td>
      <td class="rate">${rate}</td>
    </tr>`;
  }).join('');
}

function sortTable(col) {
  sortDir = sortCol===col ? (sortDir==='asc'?'desc':'asc') :
    (['mql1','sao','cw','dq','cw_mrr'].includes(col) ? 'desc' : 'asc');
  sortCol = col;
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col===col) th.classList.add('sort-'+sortDir);
  });
  renderTable();
}

/* ── CONTROLS ── */
function applyFilters() {
  if (lineChart)       { lineChart.destroy();       lineChart = null; }
  if (stackedBarChart) { stackedBarChart.destroy(); stackedBarChart = null; }
  render();
}

function resetFilters() {
  document.getElementById('startDate').value = '2025-01-01';
  document.getElementById('endDate').value   = new Date().toISOString().slice(0,10);
  document.getElementById('metricSel').value = 'sao';
  soloTier = null;
  updateSoloBanner();
  applyFilters();
}

document.getElementById('metricSel').addEventListener('change', applyFilters);

/* Legend click: solo a tier (click again to revert) */
function legendClick(e, legendItem) {
  const tier = legendItem.text;
  soloTier = soloTier === tier ? null : tier;
  updateSoloBanner();
  applyFilters();
}

function clearSolo() {
  soloTier = null;
  updateSoloBanner();
  applyFilters();
}

function updateSoloBanner() {
  const banner = document.getElementById('soloBanner');
  const label  = document.getElementById('soloLabel');
  if (soloTier) {
    label.textContent = `Showing only: ${soloTier}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

/* ── DARK MODE ── */
(function(){
  const s = localStorage.getItem('theme');
  if (s==='dark') {
    document.documentElement.setAttribute('data-theme','dark');
    Chart.defaults.color      = '#c6c2bf';
    Chart.defaults.borderColor = '#2d2a28';
  }
})();
document.getElementById('themeBtn').addEventListener('click', () => {
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  if (dark) {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeBtn').textContent = '🌙';
    localStorage.setItem('theme','light');
    Chart.defaults.color      = '#676260';
    Chart.defaults.borderColor = 'rgba(0,0,0,.06)';
  } else {
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeBtn').textContent = '☀️';
    localStorage.setItem('theme','dark');
    Chart.defaults.color      = '#c6c2bf';
    Chart.defaults.borderColor = '#2d2a28';
  }
  [lineChart,stackedBarChart].forEach(c => c && c.update());
});

/* ── INIT ── */
document.getElementById('endDate').value = new Date().toISOString().slice(0,10);
if (document.documentElement.getAttribute('data-theme')==='dark')
  document.getElementById('themeBtn').textContent = '☀️';

loadData();
</script>
